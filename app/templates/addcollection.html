<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Collection - Dairy Management</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    color: #fff;
}

.navbar {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.nav-brand { font-size: 18px; font-weight: 700; color: #38ef7d; }
.btn-back {
    padding: 7px 18px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
}
.btn-back:hover { background: rgba(255,255,255,0.12); }

.page { max-width: 750px; margin: 36px auto; padding: 0 20px 48px; }

.page-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
}
.page-title .icon { font-size: 32px; }
.page-title h2 { font-size: 22px; font-weight: 700; }
.page-title p { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 2px; }

.form-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 32px;
}

.msg {
    display: none;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 20px;
}
.msg.success { background: rgba(56,239,125,0.12); color: #38ef7d; border: 1px solid rgba(56,239,125,0.25); }
.msg.error   { background: rgba(255,80,80,0.12);  color: #ff6b6b; border: 1px solid rgba(255,80,80,0.25); }
.msg.warning { background: rgba(255,200,50,0.12); color: #ffc832; border: 1px solid rgba(255,200,50,0.25); }
.msg.update  { background: rgba(54,209,220,0.12); color: #36d1dc; border: 1px solid rgba(54,209,220,0.25); }

.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.section-gap { margin-top: 16px; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.8px;
}
.field input, .field select {
    padding: 11px 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    outline: none;
    transition: all 0.3s;
}
.field input[readonly] {
    background: rgba(56,239,125,0.07);
    border-color: rgba(56,239,125,0.2);
    color: #38ef7d;
    font-weight: 600;
}
.field input::placeholder { color: rgba(255,255,255,0.2); }
.field input:focus, .field select:focus {
    border-color: #38ef7d;
    background: rgba(56,239,125,0.07);
    box-shadow: 0 0 0 3px rgba(56,239,125,0.08);
}
.field select option { background: #203a43; }

/* Total highlight */
.total-card {
    background: rgba(56,239,125,0.08);
    border: 1px solid rgba(56,239,125,0.2);
    border-radius: 14px;
    padding: 18px 22px;
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.total-card .label { font-size: 13px; color: rgba(255,255,255,0.5); }
.total-card .amount { font-size: 28px; font-weight: 700; color: #38ef7d; }
.total-card .amount span { font-size: 14px; font-weight: 400; }

.btn-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
}
.btn {
    flex: 1;
    min-width: 100px;
    padding: 11px 16px;
    border: none;
    border-radius: 11px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
}
.btn:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-submit { background: linear-gradient(to right, #11998e, #38ef7d); color: #0f2027; }
.btn-update { background: linear-gradient(to right, #f7971e, #ffd200); color: #0f2027; }
.btn-delete { background: linear-gradient(to right, #ff416c, #ff4b2b); color: #fff; }
.btn-reset  { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.12); }
</style>
</head>
<body>

<div class="navbar">
    <div class="nav-brand">🐄 Dairy Manager</div>
    <a href="/dashboard" class="btn-back">⬅ Back</a>
</div>

<div class="page">
    <div class="page-title">
        <span class="icon">➕</span>
        <div>
            <h2>Add Milk Collection</h2>
            <p>Record daily milk collection entry</p>
        </div>
    </div>

    <div class="form-card">
        <div class="msg" id="msg"></div>

        <div class="grid-3">
            <div class="field">
                <label>Date</label>
                <input type="date" id="date">
            </div>
            <div class="field">
                <label>Time</label>
                <select id="time">
                    <option value="">Select</option>
                    <option>Morning</option>
                    <option>Evening</option>
                </select>
            </div>
            <div class="field">
                <label>Milk Type</label>
                <select id="type">
                    <option value="">Select</option>
                    <option>Cow</option>
                    <option>Buffalo</option>
                </select>
            </div>
        </div>

        <div class="grid-2 section-gap">
            <div class="field">
                <label>Customer Code</label>
                <input type="text" id="code" placeholder="e.g. 101">
            </div>
            <div class="field">
                <label>Liters</label>
                <input type="number" id="liters" placeholder="0.0" oninput="calcTotal()">
            </div>
        </div>

        <div class="grid-2 section-gap">
            <div class="field">
                <label>Fat %</label>
                <input type="number" id="fat" placeholder="e.g. 4.5">
            </div>
            <div class="field">
                <label>SNF %</label>
                <input type="number" id="snf" placeholder="e.g. 8.5">
            </div>
        </div>

        <div class="grid-2 section-gap">
            <div class="field">
                <label>Rate (₹/Liter)</label>
                <input type="number" id="rate" placeholder="0.00" oninput="calcTotal()">
            </div>
            <div class="field">
                <label>Total Amount (₹)</label>
                <input type="number" id="totalDisplay" placeholder="0.00" readonly>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-submit" onclick="submitRecord()">✔ Submit</button>
            <button class="btn btn-update" onclick="updateRecord()">✏ Update</button>
            <button class="btn btn-delete" onclick="deleteRecord()">🗑 Delete</button>
            <button class="btn btn-reset"  onclick="resetForm()">✕ Reset</button>
        </div>
    </div>
</div>

<script>
let currentRecordId = null;

function showMsg(text, type) {
    const el = document.getElementById("msg");
    el.textContent = text;
    el.className = "msg " + type;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3500);
}

function calcTotal() {
    const l = parseFloat(document.getElementById("liters").value) || 0;
    const r = parseFloat(document.getElementById("rate").value) || 0;
    document.getElementById("totalDisplay").value = (l * r).toFixed(2);
}

function getData() {
    const d = {
        date:      document.getElementById("date").value,
        time:      document.getElementById("time").value,
        milk_type: document.getElementById("type").value,
        code:      document.getElementById("code").value.trim(),
        liters:    document.getElementById("liters").value,
        fat:       document.getElementById("fat").value || 0,
        snf:       document.getElementById("snf").value || 0,
        rate:      document.getElementById("rate").value,
        total:     document.getElementById("totalDisplay").value
    };
    if (!d.date || !d.time || !d.milk_type || !d.code || !d.liters || !d.rate) {
        showMsg("⚠ Please fill all required fields", "warning");
        return null;
    }
    return d;
}

function fillForm(r) {
    document.getElementById("date").value         = r.date        || "";
    document.getElementById("time").value         = r.time        || "";
    document.getElementById("type").value         = r.milk_type   || "";
    document.getElementById("code").value         = r.customer_code || r.code || "";
    document.getElementById("liters").value       = r.liters      || "";
    document.getElementById("fat").value          = r.fat         || "";
    document.getElementById("snf").value          = r.snf         || "";
    document.getElementById("rate").value         = r.rate        || "";
    document.getElementById("totalDisplay").value = r.total       || "";
    currentRecordId = r.id || null;
}

// Search by customer code - load latest record
document.getElementById("code").addEventListener("blur", function() {
    const code = this.value.trim();
    if (!code) return;
    fetch('/api/collection/all')
        .then(r => r.json())
        .then(d => {
            if (d.success && d.data) {
                const records = d.data.filter(r => (r.customer_code || r.code) === code);
                if (records.length > 0) {
                    fillForm(records[0]);
                    showMsg("✔ Latest record loaded — Edit and click Update", "update");
                }
            }
        })
        .catch(() => {});
});

// ── SUBMIT ───────────────────────────────
function submitRecord() {
    const data = getData();
    if (!data) return;

    fetch('/api/collection/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            showMsg("✔ Collection Added Successfully", "success");
            if (d.id) currentRecordId = d.id;
        } else {
            showMsg("✘ " + d.message, "error");
        }
    })
    .catch(() => showMsg("✘ Server error", "error"));
}

// ── UPDATE ───────────────────────────────
function updateRecord() {
    if (!currentRecordId) { showMsg("⚠ Please enter Customer Code first to load record", "warning"); return; }
    const data = getData();
    if (!data) return;
    data.id = currentRecordId;

    fetch('/api/collection/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(d => showMsg(d.success ? "✔ Collection Updated Successfully" : "✘ " + d.message, d.success ? "update" : "error"))
    .catch(() => showMsg("✘ Server error", "error"));
}

// ── DELETE ───────────────────────────────
function deleteRecord() {
    if (!currentRecordId) { showMsg("⚠ Please enter Customer Code first to load record", "warning"); return; }
    if (!confirm("Are you sure you want to delete this record?")) return;

    fetch('/api/collection/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: currentRecordId })
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            showMsg("🗑 Collection Deleted Successfully", "error");
            resetForm();
        } else {
            showMsg("✘ " + d.message, "error");
        }
    })
    .catch(() => showMsg("✘ Server error", "error"));
}

function resetForm() {
    document.querySelectorAll("input, select").forEach(el => el.value = "");
    document.getElementById("totalDisplay").value = "";
    currentRecordId = null;
}

// Set today's date by default
document.getElementById("date").value = new Date().toISOString().split("T")[0];
</script>
</body>
</html>
