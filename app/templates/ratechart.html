<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Rates - Dairy Management</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    color: #fff;
}

.navbar {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.nav-brand { font-size: 18px; font-weight: 700; color: #38ef7d; }
.btn-back {
    padding: 7px 18px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
}
.btn-back:hover { background: rgba(255,255,255,0.12); }

.page { max-width: 860px; margin: 36px auto; padding: 0 20px 48px; }

.page-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
}
.page-title .icon { font-size: 32px; }
.page-title h2 { font-size: 22px; font-weight: 700; }
.page-title p { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 2px; }

.cards-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
}

.rate-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px;
}
.rate-card.cow-card     { border-top: 3px solid #f7971e; }
.rate-card.buffalo-card { border-top: 3px solid #36d1dc; }

.card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
}
.card-header .icon { font-size: 28px; }
.card-header h3 { font-size: 18px; font-weight: 700; }

.msg {
    display: none;
    padding: 10px 14px;
    border-radius: 9px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 16px;
}
.msg.success { background: rgba(56,239,125,0.12); color: #38ef7d; border: 1px solid rgba(56,239,125,0.25); }
.msg.error   { background: rgba(255,80,80,0.12);  color: #ff6b6b; border: 1px solid rgba(255,80,80,0.25); }
.msg.warning { background: rgba(255,200,50,0.12); color: #ffc832; border: 1px solid rgba(255,200,50,0.25); }
.msg.update  { background: rgba(54,209,220,0.12); color: #36d1dc; border: 1px solid rgba(54,209,220,0.25); }

.field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
}
.field label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.8px;
}
.field input {
    padding: 11px 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-family: 'Poppins', sans-serif;
    outline: none;
    transition: all 0.3s;
}
.field input::placeholder { color: rgba(255,255,255,0.2); }

.cow-card .field input:focus    { border-color: #f7971e; background: rgba(247,151,30,0.07); box-shadow: 0 0 0 3px rgba(247,151,30,0.08); }
.buffalo-card .field input:focus { border-color: #36d1dc; background: rgba(54,209,220,0.07); box-shadow: 0 0 0 3px rgba(54,209,220,0.08); }

.btn-row {
    display: flex;
    gap: 10px;
    margin-top: 6px;
}
.btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
}
.btn:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-submit-cow    { background: linear-gradient(to right, #f7971e, #ffd200); color: #0f2027; }
.btn-update-cow    { background: rgba(247,151,30,0.2); color: #f7971e; border: 1px solid rgba(247,151,30,0.3); }
.btn-submit-buf    { background: linear-gradient(to right, #36d1dc, #5b86e5); color: #fff; }
.btn-update-buf    { background: rgba(54,209,220,0.2); color: #36d1dc; border: 1px solid rgba(54,209,220,0.3); }

/* View button */
.view-btn-row {
    text-align: center;
    margin-top: 28px;
}
.btn-view {
    padding: 12px 36px;
    background: linear-gradient(to right, #11998e, #38ef7d);
    color: #0f2027;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: opacity 0.2s;
}
.btn-view:hover { opacity: 0.88; }

@media(max-width:600px) { .cards-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="navbar">
    <div class="nav-brand">🐄 Dairy Manager</div>
    <a href="/dashboard" class="btn-back">⬅ Back</a>
</div>

<div class="page">
    <div class="page-title">
        <span class="icon">💰</span>
        <div>
            <h2>Milk Rate Chart</h2>
            <p>Set Fat, SNF and Rate for Cow & Buffalo milk</p>
        </div>
    </div>

    <!-- Date selector (shared) -->
    <div style="max-width:340px; margin: 0 auto 24px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:16px 20px;">
        <label style="font-size:12px; color:rgba(255,255,255,0.5); letter-spacing:0.8px; text-transform:uppercase;">Date</label>
        <input type="date" id="rateDate" style="width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:10px 14px; color:#fff; font-family:'Poppins',sans-serif; font-size:14px; margin-top:6px;">
    </div>

    <div class="cards-row">

        <!-- COW CARD -->
        <div class="rate-card cow-card">
            <div class="card-header">
                <span class="icon">🐄</span>
                <h3>Cow Milk</h3>
            </div>
            <div class="msg" id="cowMsg"></div>
            <div class="field">
                <label>Fat %</label>
                <input type="number" id="cowFat" placeholder="e.g. 3.5" step="0.1">
            </div>
            <div class="field">
                <label>SNF %</label>
                <input type="number" id="cowSnf" placeholder="e.g. 8.0" step="0.1">
            </div>
            <div class="field">
                <label>Rate per Liter (₹)</label>
                <input type="number" id="cowRate" placeholder="e.g. 28.00" step="0.01">
            </div>
            <div class="btn-row">
                <button class="btn btn-submit-cow" onclick="submitCow()">✔ Add New</button>
                <button class="btn btn-update-cow" onclick="updateCow()">✏ Update</button>
            </div>
        </div>

        <!-- BUFFALO CARD -->
        <div class="rate-card buffalo-card">
            <div class="card-header">
                <span class="icon">🐃</span>
                <h3>Buffalo Milk</h3>
            </div>
            <div class="msg" id="bufMsg"></div>
            <div class="field">
                <label>Fat %</label>
                <input type="number" id="bufFat" placeholder="e.g. 6.0" step="0.1">
            </div>
            <div class="field">
                <label>SNF %</label>
                <input type="number" id="bufSnf" placeholder="e.g. 9.0" step="0.1">
            </div>
            <div class="field">
                <label>Rate per Liter (₹)</label>
                <input type="number" id="bufRate" placeholder="e.g. 38.00" step="0.01">
            </div>
            <div class="btn-row">
                <button class="btn btn-submit-buf" onclick="submitBuf()">✔ Add New</button>
                <button class="btn btn-update-buf" onclick="updateBuf()">✏ Update</button>
            </div>
        </div>

    </div>

    <div class="view-btn-row">
        <a href="/rates/view" class="btn-view">📊 View Rate Chart</a>
    </div>
</div>

<script>
let cowId = null;
let bufId = null;

// Set today's date
document.getElementById("rateDate").value = new Date().toISOString().split("T")[0];

function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "msg " + type;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3500);
}

function getDate() {
    return document.getElementById("rateDate").value || new Date().toISOString().split("T")[0];
}

// ── COW ADD NEW ───────────────────────────
function submitCow() {
    const fat  = document.getElementById("cowFat").value;
    const snf  = document.getElementById("cowSnf").value;
    const rate = document.getElementById("cowRate").value;
    const date = getDate();
    if (!fat || !snf || !rate) { showMsg("cowMsg", "⚠ Please fill all Cow fields", "warning"); return; }

    fetch('/api/rate/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ milk_type: 'Cow', fat, snf, rate, date })
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            cowId = d.id;
            showMsg("cowMsg", "✔ Cow Rate Added for " + date, "success");
        } else {
            showMsg("cowMsg", "✘ " + d.message, "error");
        }
    })
    .catch(() => showMsg("cowMsg", "✘ Server error", "error"));
}

// ── COW UPDATE ────────────────────────────
function updateCow() {
    const fat  = document.getElementById("cowFat").value;
    const snf  = document.getElementById("cowSnf").value;
    const rate = document.getElementById("cowRate").value;
    if (!fat || !snf || !rate) { showMsg("cowMsg", "⚠ Please fill all Cow fields", "warning"); return; }
    if (!cowId) { showMsg("cowMsg", "⚠ No record selected. Add a record first.", "warning"); return; }

    fetch('/api/rate/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: cowId, milk_type: 'Cow', fat, snf, rate })
    })
    .then(r => r.json())
    .then(d => showMsg("cowMsg", d.success ? "✔ Cow Rate Updated Successfully" : "✘ " + d.message, d.success ? "update" : "error"))
    .catch(() => showMsg("cowMsg", "✘ Server error", "error"));
}

// ── BUFFALO ADD NEW ───────────────────────
function submitBuf() {
    const fat  = document.getElementById("bufFat").value;
    const snf  = document.getElementById("bufSnf").value;
    const rate = document.getElementById("bufRate").value;
    const date = getDate();
    if (!fat || !snf || !rate) { showMsg("bufMsg", "⚠ Please fill all Buffalo fields", "warning"); return; }

    fetch('/api/rate/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ milk_type: 'Buffalo', fat, snf, rate, date })
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            bufId = d.id;
            showMsg("bufMsg", "✔ Buffalo Rate Added for " + date, "success");
        } else {
            showMsg("bufMsg", "✘ " + d.message, "error");
        }
    })
    .catch(() => showMsg("bufMsg", "✘ Server error", "error"));
}

// ── BUFFALO UPDATE ────────────────────────
function updateBuf() {
    const fat  = document.getElementById("bufFat").value;
    const snf  = document.getElementById("bufSnf").value;
    const rate = document.getElementById("bufRate").value;
    if (!fat || !snf || !rate) { showMsg("bufMsg", "⚠ Please fill all Buffalo fields", "warning"); return; }
    if (!bufId) { showMsg("bufMsg", "⚠ No record selected. Add a record first.", "warning"); return; }

    fetch('/api/rate/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: bufId, milk_type: 'Buffalo', fat, snf, rate })
    })
    .then(r => r.json())
    .then(d => showMsg("bufMsg", d.success ? "✔ Buffalo Rate Updated Successfully" : "✘ " + d.message, d.success ? "update" : "error"))
    .catch(() => showMsg("bufMsg", "✘ Server error", "error"));
}
</script>
</body>
</html>
