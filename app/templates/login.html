<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dairy Management System - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 20px 0;
        }

        /* Animated background blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: floatBlob 8s ease-in-out infinite;
            pointer-events: none;
        }
        .blob1 { width: 400px; height: 400px; background: #38ef7d; top: -100px; left: -100px; animation-delay: 0s; }
        .blob2 { width: 300px; height: 300px; background: #11998e; bottom: -80px; right: -80px; animation-delay: 3s; }
        .blob3 { width: 250px; height: 250px; background: #74ebd5; top: 50%; left: 50%; animation-delay: 5s; }

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.05); }
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            width: 420px;
            padding: 24px 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        /* Logo / Title */
        .brand {
            text-align: center;
            margin-bottom: 16px;
        }
        .brand .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 4px;
        }
        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        .brand p {
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            margin-top: 2px;
        }

        /* Toggle Tabs */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 16px;
        }
        .tab {
            flex: 1;
            padding: 9px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.3s ease;
        }
        .tab.active {
            background: linear-gradient(to right, #11998e, #38ef7d);
            color: #0f2027;
        }

        /* Forms */
        .form { display: none; animation: fadeIn 0.4s ease; }
        .form.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .field {
            margin-bottom: 11px;
        }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 7px;
        }
        .field input, .field select {
            width: 100%;
            padding: 9px 13px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: all 0.3s;
        }
        .field input::placeholder { color: rgba(255,255,255,0.25); }
        .field input:focus, .field select:focus {
            border-color: #38ef7d;
            background: rgba(56, 239, 125, 0.08);
            box-shadow: 0 0 0 3px rgba(56,239,125,0.1);
        }
        .field select option { background: #203a43; color: #fff; }

        /* Two-column grid for register */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #11998e, #38ef7d);
            color: #0f2027;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-top: 6px;
            transition: opacity 0.2s, transform 0.2s;
            letter-spacing: 0.3px;
        }
        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Message */
        .msg {
            display: none;
            text-align: center;
            padding: 11px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 14px;
        }
        .msg.success { background: rgba(56,239,125,0.15); color: #38ef7d; border: 1px solid rgba(56,239,125,0.3); }
        .msg.error   { background: rgba(255,80,80,0.15);  color: #ff5050;  border: 1px solid rgba(255,80,80,0.3); }
        .msg.warning { background: rgba(255,200,50,0.15); color: #ffc832;  border: 1px solid rgba(255,200,50,0.3); }

        /* Footer note */
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">

    <div class="brand">
        <span class="icon">🐄</span>
        <h1>Dairy Management System</h1>
        <p>Manage your dairy operations efficiently</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Login</div>
        <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <!-- LOGIN FORM -->
    <div class="form active" id="loginForm">
        <div class="field">
            <label>Username</label>
            <input type="text" id="loginUser" placeholder="Enter username">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="••••••••">
        </div>
        <button class="btn-submit" onclick="doLogin()">Login →</button>
        <div class="msg" id="loginMsg"></div>
    </div>

    <!-- REGISTER FORM -->
    <div class="form" id="registerForm">
        <div class="grid-2">
            <div class="field">
                <label>First Name</label>
                <input type="text" id="regFirst" placeholder="Ramesh">
            </div>
            <div class="field">
                <label>Last Name</label>
                <input type="text" id="regLast" placeholder="Patil">
            </div>
        </div>
        <div class="field">
            <label>Username</label>
            <input type="text" id="regUser" placeholder="Choose a username">
        </div>
        <div class="field">
            <label>Mobile Number</label>
            <input type="text" id="regMobile" placeholder="10-digit mobile number">
        </div>
        <div class="grid-2">
            <div class="field">
                <label>Password</label>
                <input type="password" id="regPass" placeholder="••••••••">
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <input type="password" id="regConfirm" placeholder="••••••••">
            </div>
        </div>
        <div class="field">
            <label>Role</label>
            <select id="regRole" style="display:none;">
                <option value="operator">Operator</option>
            </select>
        </div>
        <button class="btn-submit" onclick="doRegister()">Create Account →</button>
        <div class="msg" id="registerMsg"></div>
    </div>

    <div class="footer-note">Dairy Management System v1.0</div>
</div>

<script>
    // ---- Tab Switch ----
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
        });
        document.getElementById('loginForm').classList.toggle('active', tab === 'login');
        document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    }

    // ---- Show Message ----
    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg ' + type;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    // ---- LOGIN ----
    function doLogin() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();

        if (!user || !pass) {
            showMsg('loginMsg', '⚠ Please enter username and password', 'warning');
            return;
        }

        // API Call to Flask backend
        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showMsg('loginMsg', '✔ Login Successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard', 1500);
            } else {
                showMsg('loginMsg', '✘ ' + (data.message || 'Invalid credentials'), 'error');
            }
        })
        .catch(() => {
            // Demo mode (no backend yet)
            showMsg('loginMsg', '✔ Login Successful! (Demo Mode)', 'success');
        });
    }

    // ---- REGISTER ----
    function doRegister() {
        const first   = document.getElementById('regFirst').value.trim();
        const last    = document.getElementById('regLast').value.trim();
        const user    = document.getElementById('regUser').value.trim();
        const mobile  = document.getElementById('regMobile').value.trim();
        const pass    = document.getElementById('regPass').value.trim();
        const confirm = document.getElementById('regConfirm').value.trim();
        const role    = 'operator'; // default role

        if (!first || !last || !user || !mobile || !pass || !confirm) {
            showMsg('registerMsg', '⚠ Please fill all fields', 'warning');
            return;
        }
        if (!/^\d{10}$/.test(mobile)) {
            showMsg('registerMsg', '⚠ Enter valid 10-digit mobile number', 'warning');
            return;
        }
        if (pass !== confirm) {
            showMsg('registerMsg', '✘ Passwords do not match', 'error');
            return;
        }
        if (pass.length < 6) {
            showMsg('registerMsg', '⚠ Password must be at least 6 characters', 'warning');
            return;
        }

        // API Call to Flask backend
        fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ first_name: first, last_name: last, username: user, mobile: mobile, password: pass, role: role })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showMsg('registerMsg', '✔ Account created! Please login.', 'success');
                setTimeout(() => switchTab('login'), 2000);
            } else {
                showMsg('registerMsg', '✘ ' + (data.message || 'Registration failed'), 'error');
            }
        })
        .catch(() => {
            // Demo mode
            showMsg('registerMsg', '✔ Account Created! (Demo Mode)', 'success');
            setTimeout(() => switchTab('login'), 2000);
        });
    }

    // Enter key support
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (document.getElementById('loginForm').classList.contains('active')) doLogin();
            else doRegister();
        }
    });
</script>

</body>
</html>
